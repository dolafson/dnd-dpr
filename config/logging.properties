# Logging
handlers = java.util.logging.FileHandler, java.util.logging.ConsoleHandler
#.level = ALL
.level = INFO
com.vikinghelmet = FINE

# Console Logging
java.util.logging.ConsoleHandler.level = FINEST
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

#java.util.logging.SimpleFormatter.format = %1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$s %2$s %5$s%6$s%n

# Format String Placeholders:
# %1: Date/Time (ZonedDateTime)
# %2: Source (caller's class and method)
# %3: Logger name
# %4: Log level (e.g., INFO, WARNING)
# %5: The log message
# %6: Throwable/Exception stack trace (if any) 

#java.util.logging.SimpleFormatter.format = %1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$s %2$s %5$s%6$s%n
#java.util.logging.SimpleFormatter.format = %1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS 
java.util.logging.SimpleFormatter.format = %1$tH:%1$tM:%1$tS  %5$s%6$s%n


